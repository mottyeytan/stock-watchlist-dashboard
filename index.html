function intervalForRange(range){

}
function tvSymbol(sym){
  sym = (sym || '').toUpperCase().replace('.','_');
  if(sym.includes(':')) return sym;
  const exch = EXCHANGE_OVERRIDES[sym] || 'NASDAQ';
  return `${exch}:${sym}`;
}
function renderMeta(){
  document.getElementById('meta').innerHTML = `עודכן: <b>${DASHBOARD_DATA.generatedAt}</b> · מקור: ${DASHBOARD_DATA.source || 'Hermes daily watchlist'} · Watchlist ID: <span dir="ltr">${DASHBOARD_DATA.watchlistId || '-'}</span>`;
}
function chipClass(bucket){
  const b=bucket.toLowerCase();
  if(b.includes('top')) return 'top'; if(b.includes('aggressive')) return 'aggr'; if(b.includes('reject')||b.includes('avoid')) return 'avoid'; return '';
}
function renderStrategies(){
  const q=(document.getElementById('search').value||'').trim().toUpperCase();
  const root=document.getElementById('strategies'); root.innerHTML='';
  for(const st of DASHBOARD_DATA.strategies){
    const div=document.createElement('div'); div.className='strategy';
    div.innerHTML=`<h2>${st.title}</h2>`;
    for(const [bucket, symbols] of Object.entries(st.buckets||{})){
      const filtered=(symbols||[]).filter(s=>!q || s.toUpperCase().includes(q));
      if(!filtered.length) continue;
      const b=document.createElement('div'); b.className='bucket';
      b.innerHTML=`<div class="bucket-title">${bucket}</div><div class="chips"></div>`;
      const chips=b.querySelector('.chips');
      filtered.forEach(sym=>{
        const c=document.createElement('button'); c.className=`chip ${chipClass(bucket)} ${tvSymbol(sym)===selected?'active':''}`; c.textContent=sym; c.onclick=()=>selectSymbol(sym); chips.appendChild(c);
      });
      div.appendChild(b);
    }
    root.appendChild(div);
  }
}
function selectSymbol(sym){ selected=tvSymbol(sym); document.getElementById('symbolTitle').textContent=selected; renderStrategies(); renderSummary(sym); loadChart(); }
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function renderSummary(sym){
  const raw=(sym||selected).split(':').pop().replace('_','.');
  const r=(DASHBOARD_DATA.rationale && DASHBOARD_DATA.rationale[raw]) || [];
  const base=(DASHBOARD_DATA.baselinePrices && DASHBOARD_DATA.baselinePrices[raw]) || null;
  const p=(DASHBOARD_DATA.companyProfiles && DASHBOARD_DATA.companyProfiles[raw]) || {};
  const news=(p.news||[]).slice(0,5);
  const sources=(p.sources||[]).slice(0,6);
  const profileHtml = p.companyName ? `
    <h4>מה החברה עושה</h4>
    <div class="profileGrid">
      <div class="infoCard"><div class="infoLabel">שם חברה</div><div class="infoVal">${escapeHtml(p.companyName)}</div></div>
      <div class="infoCard"><div class="infoLabel">סקטור / תעשייה</div><div>${escapeHtml(p.sectorHe || p.sector || '-')} · ${escapeHtml(p.industryHe || p.industry || '-')}</div></div>
      <div class="infoCard"><div class="infoLabel">שווי שוק</div><div class="infoVal">${escapeHtml(p.marketCap || '-')}</div></div>
      <div class="infoCard"><div class="infoLabel">מחזור / ווליום</div><div class="infoVal">${escapeHtml(p.volume || '-')}</div></div>
    </div>
    <p>${escapeHtml(p.hebrewSummary || 'אין עדיין תיאור חברה מעודכן.')}</p>
    ${p.whatToKnow ? `<h4>מה חשוב לדעת עכשיו</h4><ul>${p.whatToKnow.map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul>` : ''}
    ${news.length ? `<h4>חדשות ועדכונים אחרונים</h4>${news.map(n=>`<div class="newsItem"><a href="${escapeHtml(n.url)}" target="_blank" rel="noopener">${escapeHtml(n.title)}</a><div class="note">${escapeHtml(n.publisher||'')} · ${escapeHtml(n.published||'')}</div></div>`).join('')}` : '<h4>חדשות ועדכונים אחרונים</h4><div class="note">לא נמצאו חדשות זמינות במקור החינמי בזמן יצירת הדשבורד.</div>'}
    ${sources.length ? `<h4>מקורות</h4><div class="sourceLinks">${sources.map(s=>`<div>• <a href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.label)}</a></div>`).join('')}</div>` : ''}
  ` : '<h4>מה החברה עושה</h4><div class="note">אין עדיין פרופיל חברה לסימול הזה. הדוח היומי הבא ינסה להשלים אותו ממקורות Nasdaq/Yahoo/SEC.</div>';
  document.getElementById('summary').innerHTML=`<h3 dir="ltr">${raw}</h3>`+
    (base?`<div class="note">Baseline: ${base.price} · ${base.date || ''} · ${base.source || ''}</div>`:'')+
    `<h4>למה היא נמצאת ברשימה</h4><ul>${(Array.isArray(r)?r:[r]).map(x=>`<li>${escapeHtml(x)}</li>`).join('') || '<li>אין רציונל מפורט בסנאפשוט האחרון.</li>'}</ul>`+
    profileHtml;
}
function loadChart(){
  const box=document.getElementById('tv_chart'); box.innerHTML='';
  const script=document.createElement('script');
  // Symbol Overview respects `dateRange` much more reliably than Advanced Chart.
  // This prevents the default view from opening zoomed into only the latest ~30 minutes.
  script.src='https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js';
  script.async=true;
  script.innerHTML=JSON.stringify({
    symbols:[[selected, selected]],
    chartOnly:false,
    width:'100%',
    height:'100%',
    locale:'en',
    colorTheme:'dark',
    autosize:true,
    showVolume:true,
    showMA:true,
    hideDateRanges:false,
    hideMarketStatus:false,
    hideSymbolLogo:false,
    scalePosition:'right',
    scaleMode:'Normal',
    fontFamily:'Inter, Arial, sans-serif',
    fontSize:'12',
    noTimeScale:false,
    valuesTracking:'1',
    changeMode:'price-and-percent',
    chartType:'candlesticks',
    dateRange:selectedRange,
    lineWidth:2,
    support_host:'https://www.tradingview.com'
  });
  box.appendChild(script);
}
document.querySelectorAll('[data-range]').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('[data-range]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');selectedRange=btn.dataset.range;loadChart();});
document.getElementById('search').addEventListener('input', renderStrategies);
renderMeta(); renderStrategies(); selectSymbol((DASHBOARD_DATA.defaultSymbol||'NVDA').split(':').pop());
</script>
</body>
</html>
